name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-orchestrator:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309e3b0c04d86f527840b9a0deb499d6a50dfd5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-orchestrator-${{ matrix.python-version }}-${{ hashFiles('orchestrator/requirements-test.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-orchestrator-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r orchestrator/requirements-test.txt
        pip install "black==26.3.1" flake8 isort pip-audit bandit

    - name: Dependency vulnerability audit
      run: |
        pip-audit -r orchestrator/requirements.txt --skip-editable

    - name: Lint orchestrator
      run: |
        flake8 orchestrator --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 orchestrator --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Check code formatting
      run: |
        black --check orchestrator

    - name: Security scan
      run: |
        bandit -r orchestrator -ll --exclude orchestrator/tests

    - name: Run orchestrator tests
      run: |
        PYTHONPATH=. pytest orchestrator/tests -v --cov=orchestrator --cov-report=xml:coverage-orchestrator.xml --cov-report=term-missing

    - name: Upload orchestrator coverage
      uses: codecov/codecov-action@5a10915283f52a1d7283e33338d78f7bccc59f7f
      if: always()
      with:
        file: ./coverage-orchestrator.xml
        flags: orchestrator
        name: codecov-orchestrator-${{ matrix.python-version }}

  test-dashboard:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309e3b0c04d86f527840b9a0deb499d6a50dfd5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-dashboard-${{ matrix.python-version }}-${{ hashFiles('dashboard/requirements-test.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-dashboard-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r dashboard/requirements-test.txt
        pip install "black==26.3.1" flake8 isort pip-audit bandit

    - name: Dependency vulnerability audit
      run: |
        pip-audit -r dashboard/requirements.txt --skip-editable

    - name: Lint dashboard
      run: |
        flake8 dashboard --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__
        flake8 dashboard --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics --exclude=__pycache__

    - name: Check code formatting
      run: |
        black --check dashboard

    - name: Security scan
      run: |
        bandit -r dashboard -ll --exclude dashboard/tests

    - name: Run dashboard tests
      run: |
        PYTHONPATH=dashboard pytest dashboard/tests -v --cov=dashboard --cov-report=xml:coverage-dashboard.xml --cov-report=term-missing

    - name: Upload dashboard coverage
      uses: codecov/codecov-action@5a10915283f52a1d7283e33338d78f7bccc59f7f
      if: always()
      with:
        file: ./coverage-dashboard.xml
        flags: dashboard
        name: codecov-dashboard-${{ matrix.python-version }}

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-orchestrator, test-dashboard]

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d275e0a4ced8431291b11f1b8f7dc6f4dd0d7e5

    - name: Build orchestrator image
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
      with:
        context: .
        file: orchestrator/Dockerfile
        push: false
        tags: security-scanner-orchestrator:test
        load: true

    - name: Build dashboard image
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
      with:
        # Dashboard Dockerfile requires root context to copy orchestrator/ and config/
        context: .
        file: dashboard/Dockerfile
        push: false
        tags: security-scanner-dashboard:test
        load: true

    - name: Scan orchestrator image with Trivy
      uses: aquasecurity/trivy-action@57a97fcb497abed97e0efd0e4db547390561ebd8
      with:
        image-ref: 'security-scanner-orchestrator:test'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'
        ignore-unfixed: true

    - name: Scan dashboard image with Trivy
      uses: aquasecurity/trivy-action@57a97fcb497abed97e0efd0e4db547390561ebd8
      with:
        image-ref: 'security-scanner-dashboard:test'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'
        ignore-unfixed: true
