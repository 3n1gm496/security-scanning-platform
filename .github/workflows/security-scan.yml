name: Security Scan

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
  workflow_call:
    secrets:
      SECURITY_SCANNER_URL:
        required: false
      SECURITY_SCANNER_API_KEY:
        required: false

jobs:
  config-check:
    name: Check scanner configuration
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.detect.outputs.enabled }}
    env:
      SECURITY_SCANNER_URL: ${{ secrets.SECURITY_SCANNER_URL }}
      SECURITY_SCANNER_API_KEY: ${{ secrets.SECURITY_SCANNER_API_KEY }}
    steps:
      - name: Detect scanner secrets
        id: detect
        run: |
          set -euo pipefail

          if [ -n "${SECURITY_SCANNER_URL}" ] && [ -n "${SECURITY_SCANNER_API_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Security scanner secrets found. Remote scan will run." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Security scanner secrets are not configured. Remote scan skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

  security-scan:
    name: Run Security Scan
    needs: config-check
    if: ${{ needs.config-check.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for Gitleaks
      
      - name: Run Security Scan
        env:
          SCANNER_URL: ${{ secrets.SECURITY_SCANNER_URL }}
          SCANNER_API_KEY: ${{ secrets.SECURITY_SCANNER_API_KEY }}
        run: |
          set -euo pipefail

          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi
          
          # Trigger scan via API
          SCAN_RESPONSE=$(curl --fail-with-body --silent --show-error --max-time 300 -X POST "${SCANNER_URL}/api/scan/trigger" \
            -H "Authorization: Bearer ${SCANNER_API_KEY}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "target_type=git" \
            -d "target=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -d "name=${GITHUB_REPOSITORY}" \
            -d "async_mode=false")

          if ! echo "${SCAN_RESPONSE}" | jq -e . >/dev/null 2>&1; then
            echo "Scanner response is not valid JSON"
            echo '{"status":"error","reason":"invalid_response"}' > scan-results.json
            exit 1
          fi

          echo "${SCAN_RESPONSE}" > scan-results.json
          
          echo "Scan Response: ${SCAN_RESPONSE}"
          
          # Check scan status
          SCAN_STATUS=$(echo "${SCAN_RESPONSE}" | jq -r '.status // "unknown"')
          POLICY_STATUS=$(echo "${SCAN_RESPONSE}" | jq -r '.output.results[0].policy_status // .policy_status // "UNKNOWN"')
          
          echo "Scan Status: ${SCAN_STATUS}"
          echo "Policy Status: ${POLICY_STATUS}"
          
          # Fail pipeline if scanner reports error
          if [ "${SCAN_STATUS}" = "error" ] || [ "${SCAN_STATUS}" = "failed" ]; then
            echo "❌ Security scanner returned error status"
            exit 1
          fi

          # Fail pipeline if policy blocked
          if [ "${POLICY_STATUS}" == "BLOCK" ]; then
            echo "❌ Security scan failed: Critical findings detected"
            exit 1
          fi
          
          echo "✅ Security scan passed"
      
      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: scan-results.json
          if-no-files-found: error
          retention-days: 30
