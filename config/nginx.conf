# Production nginx reverse proxy for the Security Scanning Dashboard.
#
# Usage:
#   1. Copy this file to /etc/nginx/conf.d/security-dashboard.conf
#   2. Replace YOURDOMAIN.COM with your actual domain
#   3. Obtain TLS certificates (e.g. via certbot / Let's Encrypt)
#   4. Set DASHBOARD_HTTPS_ONLY=1 in .env
#   5. Reload nginx: nginx -t && systemctl reload nginx

upstream dashboard {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name YOURDOMAIN.COM;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOURDOMAIN.COM;

    # --- TLS ---
    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # --- Request limits ---
    client_max_body_size 50m;

    # --- Proxy to dashboard ---
    location / {
        proxy_pass         http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts for long-running scan operations
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    # Health check — no access log noise
    location = /api/health {
        proxy_pass         http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
