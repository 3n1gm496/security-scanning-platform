paths:
  db_path: /data/security_scans.db
  reports_dir: /data/reports
  workspace_dir: /data/workspaces

scanners:
  # Python SAST — installed via pip (bandit)
  bandit:
    enabled: true

  # SAST multi-language — installed via pip (semgrep)
  semgrep:
    enabled: true
    configs:
      - p/default

  # Container/filesystem vulnerability scanner
  # Binary installed in Docker image; for bare-metal install see:
  # https://github.com/aquasecurity/trivy/releases
  trivy:
    enabled: true
    severities:
      - CRITICAL
      - HIGH
      - MEDIUM
    ignore_unfixed: false

  # Secret scanning
  # Binary installed in Docker image; for bare-metal install see:
  # https://github.com/gitleaks/gitleaks/releases
  gitleaks:
    enabled: true

  # IaC misconfiguration scanner — installed via pip (checkov)
  checkov:
    enabled: true

  # SBOM generator
  # Binary installed in Docker image; for bare-metal install see:
  # https://github.com/anchore/syft/releases
  syft:
    enabled: true

  # Nuclei vulnerability scanner
  # Binary installed in Docker image; for bare-metal install see:
  # https://github.com/projectdiscovery/nuclei/releases
  #
  # Template selection:
  #   - Leave `templates` empty ([]) to use the built-in defaults:
  #       * URL targets  → http/misconfiguration/, http/exposures/, http/technologies/,
  #                         http/cves/, http/vulnerabilities/, http/exposed-panels/,
  #                         http/default-logins/, ssl/, dns/
  #       * Git/local    → http/misconfiguration/, http/exposures/, http/cves/,
  #                         http/vulnerabilities/
  #   - Provide explicit paths to restrict or expand the template set, e.g.:
  #       templates:
  #         - http/misconfiguration/
  #         - http/cves/
  #         - /path/to/custom-templates/
  nuclei:
    enabled: true
    templates: []  # empty = auto-select defaults based on target type (see above)
    severity: "critical,high,medium"
    tags: ""  # comma-separated tags to include; empty = all (e.g. "xss,sqli,auth")

  # SBOM vulnerability scanner
  # Binary installed in Docker image; for bare-metal install see:
  # https://github.com/anchore/grype/releases
  grype:
    enabled: true

  # DAST using OWASP ZAP (requires a running ZAP instance)
  #
  # ZAP must be started separately before enabling this scanner.
  # Recommended setup via Docker:
  #
  #   docker run -d -u zap -p 8080:8080 --name zap owasp/zap2docker-stable \
  #     zap.sh -daemon -host 0.0.0.0 -port 8080 \
  #     -config api.addrs.addr.name=.* \
  #     -config api.addrs.addr.regex=true \
  #     -config api.key=changeme
  #
  # The scanner communicates with ZAP via its REST API using the
  # `python-owasp-zap-v2.4` client library (installed in the Docker image).
  owasp_zap:
    enabled: false  # set to true once a ZAP instance is running
    api_url: "http://localhost:8090"  # ZAP REST API base URL (matches docker-compose port)
    api_key: ""  # ZAP API key (set via ZAP -config api.key=...)
    spider_timeout: 120  # seconds to wait for the spider phase
    scan_timeout: 600  # seconds to wait for the active scan phase

policy:
  block_on_severities:
    - CRITICAL
  block_on_secret_categories: true

execution:
  max_concurrent_targets: 2
  # git_clone_depth: 0 = full history (default, required for accurate secret scanning).
  # Set to a positive integer (e.g. 50) in bandwidth-constrained environments.
  # WARNING: shallow clones cause gitleaks to miss secrets in older commits.
  git_clone_depth: 0

cache:
  enabled: true
  ttl_seconds: 900
  dir: /data/cache/orchestrator

retention:
  enabled: true
  reports_days: 14
  workspaces_days: 3
  cache_days: 7
