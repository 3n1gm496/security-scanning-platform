# Override for CI/sandbox environments that don't support iptables raw (e.g. GitHub Actions, GitLab CI).
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d dashboard
#
# Do NOT use in local environments (WSL2, Docker Desktop, Linux with full iptables):
# in those cases just use: docker compose up -d dashboard
services:
  dashboard:
    build:
      network: host
    network_mode: "host"
    ports: []

  orchestrator:
    build:
      network: host
