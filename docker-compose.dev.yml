services:
  dashboard:
    build:
      network: host
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    volumes:
      - ./dashboard:/app
      - ./data:/data

  orchestrator:
    build:
      network: host
    # For development, keep the container running to allow manual command execution.
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ./orchestrator:/app
      - ./data:/data
      - ./config:/app/config:ro
    # Remove the manual profile to start it by default in dev
    profiles: []
