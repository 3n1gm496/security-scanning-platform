services:
  # -------------------------------------------------------------------------
  # PostgreSQL — production database backend (optional, default: SQLite)
  # Activate with: docker compose --profile postgres up
  # Set DATABASE_URL=postgresql://security:change-me-postgres@postgres:5432/security_scans
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: security-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-security_scans}
      POSTGRES_USER: ${POSTGRES_USER:-security}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-security} -d ${POSTGRES_DB:-security_scans}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    profiles: ["postgres"]
    networks:
      - backend

  # -------------------------------------------------------------------------
  # OWASP ZAP — DAST scanner (internal only, used by the orchestrator)
  #
  # The orchestrator auto-enables ZAP when ZAP_API_URL is set in its
  # environment. The default api_key is "zap-api-key" — override via
  # ZAP_API_KEY in .env for production deployments.
  #
  # ZAP is NOT exposed to the host — it is only reachable from the
  # internal "backend" network by the orchestrator and dashboard.
  # -------------------------------------------------------------------------
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: security-zap
    user: zap
    command: >
      zap.sh -daemon
      -host 0.0.0.0
      -port 8090
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config api.key=${ZAP_API_KEY:-zap-api-key}
      -config connection.timeoutInSecs=60
    environment:
      - JAVA_OPTS=-Xmx512m
    healthcheck:
      # Pass the API key so ZAP does not log "API key incorrect" warnings.
      # The ZAP_API_KEY variable is expanded by the shell inside the container.
      test: ["CMD-SHELL", "curl -sf 'http://localhost:8090/JSON/core/view/version/?apikey=${ZAP_API_KEY:-zap-api-key}' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    volumes:
      - zap_data:/home/zap/.ZAP
    networks:
      - backend

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    env_file:
      - .env
    environment:
      ORCH_DB_PATH: ${ORCH_DB_PATH:-/data/security_scans.db}
      DATABASE_URL: ${DATABASE_URL:-}
      REPORTS_DIR: ${REPORTS_DIR:-/data/reports}
      WORKSPACE_DIR: ${WORKSPACE_DIR:-/data/workspaces}
      TRIVY_CACHE_DIR: ${TRIVY_CACHE_DIR:-/data/cache/trivy}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # ZAP integration — auto-enables owasp_zap scanner when set
      ZAP_API_URL: ${ZAP_API_URL:-http://zap:8090}
      ZAP_API_KEY: ${ZAP_API_KEY:-zap-api-key}
    volumes:
      - ./data:/data
      - ./config:/app/config:ro
    healthcheck:
      # Verify the orchestrator can import its main module and the DB path is writable
      test: ["CMD-SHELL", "python -c 'from orchestrator.main import load_settings; load_settings()' && test -w /data"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      zap:
        condition: service_healthy
        required: false
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256M
    profiles: ["manual"]
    networks:
      - backend

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: security-dashboard
    env_file:
      - .env
    environment:
      DASHBOARD_DB_PATH: ${ORCH_DB_PATH:-/data/security_scans.db}
      DATABASE_URL: ${DATABASE_URL:-}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-change-me}
      DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET:-please-change-this}
      DASHBOARD_CSP_ALLOW_UNSAFE_EVAL: ${DASHBOARD_CSP_ALLOW_UNSAFE_EVAL:-0}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # ZAP integration — forwarded to orchestrator subprocess via scan_runner.py
      ZAP_API_URL: ${ZAP_API_URL:-http://zap:8090}
      ZAP_API_KEY: ${ZAP_API_KEY:-zap-api-key}
    volumes:
      - ./data:/data
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=128M
    networks:
      - frontend
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  zap_data:
