[tool.black]
line-length = 120
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | data
)/
'''

[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip_glob = ["data/**"]

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["orchestrator/tests", "dashboard/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow running tests",
    "asyncio: Async tests (pytest-asyncio)",
]
filterwarnings = [
    # anyio uses Task.cancel(msg=...) and Future.cancel(*exc.args) which are deprecated
    # in Python 3.11.0rc1. This is an upstream issue in anyio, not in our code.
    # Tracked: https://github.com/agronholm/anyio/issues/XXX
    # Remove once anyio ships a fix or we upgrade to Python 3.12+.
    "ignore:Passing 'msg' argument to Task.cancel\\(\\) is deprecated:DeprecationWarning",
    "ignore:Passing 'msg' argument to Future.cancel\\(\\) is deprecated:DeprecationWarning",
]

[tool.coverage.run]
source = ["."]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "*/venv/*",
    "*/.venv/*",
    "*/demo/*",
    "orchestrator/scripts/*",
    "orchestrator/setup.py",
]

[tool.coverage.report]
precision = 2
fail_under = 77
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
